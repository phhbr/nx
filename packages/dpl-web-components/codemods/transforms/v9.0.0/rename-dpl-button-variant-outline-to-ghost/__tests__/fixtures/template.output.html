<div class="action-bar">
  <dpl-button variant="ghost" label="Delete"></dpl-button>
  <dpl-button variant="ghost" label="Cancel"></dpl-button>
  <dpl-button
    class="main-action"
    variant="ghost"
    disabled
  ></dpl-button>
  <dpl-button [variant]="'ghost'" label="Angular binding"></dpl-button>
  <dpl-button :variant="isActive ? 'ghost' : 'solid'"></dpl-button>
  <dpl-button [variant]="currentVariant" label="Variable"></dpl-button>
  <DplButton variant="ghost" label="Angular wrapper"></DplButton>
  <some-other-button variant="outline"></some-other-button>
</div>
