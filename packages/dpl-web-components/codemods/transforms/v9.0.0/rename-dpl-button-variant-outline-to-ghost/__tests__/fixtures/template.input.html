<div class="action-bar">
  <dpl-button variant="outline" label="Delete"></dpl-button>
  <dpl-button variant="ghost" label="Cancel"></dpl-button>
  <dpl-button
    class="main-action"
    variant="outline"
    disabled
  ></dpl-button>
  <dpl-button [variant]="'outline'" label="Angular binding"></dpl-button>
  <dpl-button :variant="isActive ? 'outline' : 'solid'"></dpl-button>
  <dpl-button [variant]="currentVariant" label="Variable"></dpl-button>
  <DplButton variant="outline" label="Angular wrapper"></DplButton>
  <some-other-button variant="outline"></some-other-button>
</div>
