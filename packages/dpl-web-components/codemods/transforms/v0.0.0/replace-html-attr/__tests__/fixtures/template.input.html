<!-- Paired tag -->
<dpl-button variant="outline">Click me</dpl-button>

<!-- Self-closing -->
<dpl-button variant="outline" />

<!-- Attribute among others -->
<dpl-button class="btn" variant="outline" disabled>Submit</dpl-button>

<!-- Multi-line tag -->
<dpl-button
  class="action"
  variant="outline"
></dpl-button>

<!-- Angular dynamic binding — string literal -->
<dpl-button [variant]="'outline'"></dpl-button>

<!-- Angular dynamic binding — ternary -->
<dpl-button [variant]="isPrimary ? 'outline' : 'solid'"></dpl-button>

<!-- Vue dynamic binding — string literal -->
<dpl-button :variant="'outline'"></dpl-button>

<!-- Vue dynamic binding — ternary -->
<dpl-button :variant="active ? 'outline' : 'filled'"></dpl-button>

<!-- Non-target elements — must NOT change -->
<other-button variant="outline"></other-button>
<dpl-chip variant="outline" />
